<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaisel Anne Pico | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,600&family=Lora:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
/* ══════════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════════ */
:root {
    --blue:        #dcf2ff;
    --blue-mid:    #b8e4ff;
    --pink:        #ffe3ec;
    --pink-dark:   #ffb6c1;
    --pink-deeper: #ff8fab;
    --white:       #ffffff;
    --dark:        #2d3142;
    --muted:       #5f6c7b;
    --light:       #f7fbff;
    --radius-lg:   28px;
    --radius-md:   18px;
    --radius-sm:   12px;
    --shadow:      0 8px 32px rgba(100,160,220,.13);
    --shadow-sm:   0 2px 12px rgba(100,160,220,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: linear-gradient(135deg, var(--blue) 0%, #f0e8ff 100%);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Poppins', sans-serif;
    color: var(--dark);
    padding: 20px;
}
.about-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #fff;
}

/* ══════════════════════════════════════════
   APP WINDOW
══════════════════════════════════════════ */
.app-window {
    width: 100%; max-width: 1120px;
    min-height: 88vh;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: 0 24px 64px rgba(80,120,200,.15);
    display: flex; flex-direction: column;
    overflow: hidden;
}

/* ══════════════════════════════════════════
   NAVBAR
══════════════════════════════════════════ */
nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 36px;
    background: var(--white);
    border-bottom: 2px solid var(--blue);
    flex-wrap: wrap; gap: 10px;
    position: sticky; top: 0; z-index: 50;
}
.brand {
    font-family: 'Playfair Display', serif;
    font-weight: 800; font-size: 1.3rem;
    color: var(--dark); letter-spacing: 1px;
}
.brand span { color: var(--pink-deeper); }
.nav-menu { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-btn {
    background: transparent;
    border: 2px solid var(--blue-mid);
    padding: 8px 16px; border-radius: 50px;
    color: var(--dark); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: .25s; font-family: 'Poppins', sans-serif;
}
.nav-btn:hover { background: var(--blue); }
.nav-btn.active-btn {
    background: var(--pink) !important;
    border-color: var(--pink-dark) !important;
    color: var(--dark) !important;
}

/* ══════════════════════════════════════════
   VIEWPORT
══════════════════════════════════════════ */
#viewport { flex: 1; overflow-y: auto; background: var(--white); }

/* ══════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════ */
.page-wrap { padding: 48px 64px; max-width: 880px; margin: 0 auto; }
.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; margin-bottom: 8px;
    color: var(--dark);
}
.page-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
.card {
    background: var(--blue);
    padding: 24px 28px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
}
.card-white {
    background: var(--white);
    border: 2px solid var(--blue);
    padding: 24px 28px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
}

/* ══════════════════════════════════════════
   FORMS (Register / Login / Contact)
══════════════════════════════════════════ */
.form-layout {
    display: flex; align-items: center;
    min-height: 75vh; padding: 48px 64px; gap: 48px;
}
.form-side-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; line-height: 1.2; margin-bottom: 12px;
}
.form-side-text h1 span { color: var(--muted); }
.form-side-text p { color: var(--muted); font-size: 0.95rem; line-height: 1.7; }
.form-box {
    flex: 1; background: var(--blue);
    padding: 36px; border-radius: 24px;
}
.form-group { margin-bottom: 14px; }
.form-group label {
    display: block; font-size: 0.78rem;
    font-weight: 600; color: var(--muted);
    margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase;
}
.form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 14px 18px;
    border-radius: 14px;
    border: 2px solid var(--blue-mid);
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 0.9rem; color: var(--dark);
    outline: none; transition: border-color .25s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--pink-dark); }
.form-group input.err, .form-group textarea.err { border-color: #ff6b81 !important; }
.err-msg {
    font-size: 0.75rem; color: #ff6b81;
    margin-top: 4px; display: block; min-height: 1.1em;
}
.form-group textarea { resize: vertical; }
.action-btn {
    width: 100%; padding: 15px;
    background: var(--pink); border: none;
    border-radius: 16px; font-weight: 700;
    cursor: pointer; transition: .25s;
    font-size: 0.95rem; font-family: 'Poppins', sans-serif;
    color: var(--dark); margin-top: 4px;
}
.action-btn:hover { background: var(--pink-dark); }
.action-btn:disabled { opacity: .6; cursor: not-allowed; }
.success-msg {
    background: #e6fff3; border: 1.5px solid #6fcf97;
    color: #1a7a4a; border-radius: 12px;
    padding: 12px 16px; font-size: 0.88rem;
    margin-top: 12px; display: none; text-align: center;
}
.global-err {
    color: #ff6b81; font-size: 0.82rem;
    text-align: center; margin-top: 8px; min-height: 1.2em;
}
.hint-text {
    text-align: center; font-size: 0.78rem;
    color: var(--muted); margin-top: 14px;
}
.hint-text code {
    background: var(--pink); padding: 2px 7px;
    border-radius: 6px; font-family: monospace; font-size: .78rem;
}
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 46px; }
.toggle-pass {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--muted); transition: color .2s;
}
.toggle-pass:hover { color: var(--dark); }
.checkbox-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
.checkbox-row label { font-size: 0.85rem; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--pink-deeper); }

/* ══════════════════════════════════════════
   ABOUT ME
══════════════════════════════════════════ */
.about-page { display: flex; flex-direction: column; align-items: center; padding: 44px 24px; }
.avatar-ring {
    width: 160px; height: 160px; border-radius: 50%;
    border: 6px solid var(--pink-dark);
    background: linear-gradient(135deg, var(--pink) 0%, var(--blue) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(255,140,170,.25);
}
.about-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem; letter-spacing: 4px; margin-bottom: 6px;
}
.about-italic {
    font-family: 'Lora', serif;
    font-style: italic; font-size: 1.1rem;
    color: var(--muted); margin-bottom: 16px;
}
.about-bio {
    font-size: 1rem; line-height: 1.85; text-align: center;
    max-width: 640px; margin-bottom: 32px; color: var(--dark);
}
.about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; max-width: 820px;
}
.about-card {
    background: var(--blue);
    border-radius: var(--radius-md); padding: 22px 24px;
}
.about-card h4 {
    font-size: 0.9rem; font-weight: 700;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.about-card h4 i { color: var(--pink-deeper); }
.about-card p, .about-card li { font-size: 0.88rem; line-height: 1.9; color: var(--muted); }
.about-card ul { padding-left: 18px; }
.mood-row { display: flex; gap: 14px; margin-top: 14px; }
.mood-box {
    flex: 1; background: var(--white);
    border-radius: 14px; padding: 16px;
    text-align: center; border: 2px solid var(--pink);
}
.mood-box .mood-emoji { font-size: 2.4rem; margin-bottom: 6px; display: block; }
.mood-box p { font-size: 0.78rem; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
.skills-bar-list { list-style: none; margin-top: 8px; }
.skills-bar-list li { margin-bottom: 10px; }
.skill-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
.skill-bar { height: 7px; background: var(--white); border-radius: 10px; overflow: hidden; }
.skill-fill { height: 100%; background: linear-gradient(90deg, var(--pink-deeper), var(--pink-dark)); border-radius: 10px; transition: width 1s ease; }

/* ══════════════════════════════════════════
   PROJECTS
══════════════════════════════════════════ */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.filter-btn {
    padding: 7px 18px; border-radius: 50px;
    border: 2px solid var(--blue-mid);
    background: transparent; font-size: 0.78rem;
    font-weight: 600; cursor: pointer; transition: .2s;
    font-family: 'Poppins', sans-serif; color: var(--dark);
}
.filter-btn.active, .filter-btn:hover { background: var(--pink); border-color: var(--pink-dark); }
.projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.proj-card {
    background: var(--blue); border-radius: var(--radius-md);
    overflow: hidden; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    border: 2px solid transparent;
}
.proj-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--pink-dark); }
.proj-thumb {
    height: 100px; background: linear-gradient(135deg, var(--pink) 0%, var(--blue) 100%);
    display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
}
.proj-body { padding: 18px 20px; }
.proj-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.proj-tag {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase;
    background: var(--white); color: var(--muted);
    padding: 3px 9px; border-radius: 8px;
}
.proj-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.proj-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
.proj-card.hidden { display: none; }

/* Modal */
.modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(45,49,66,.5);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none;
    transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
    background: var(--white); border-radius: var(--radius-lg);
    padding: 36px; max-width: 520px; width: 100%;
    transform: translateY(20px); transition: transform .25s;
    position: relative; max-height: 80vh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-close {
    position: absolute; top: 14px; right: 16px;
    background: var(--blue); border: none; width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: .9rem; transition: .2s;
}
.modal-close:hover { background: var(--pink); }
.modal-emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 10px; }
.modal-body { font-size: 0.88rem; color: var(--muted); line-height: 1.8; margin-bottom: 16px; }
.modal-tech { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.modal-tag {
    font-size: 0.7rem; font-weight: 700;
    background: var(--pink); color: var(--dark);
    padding: 4px 10px; border-radius: 8px;
    letter-spacing: .05em; text-transform: uppercase;
}
.modal-link {
    display: inline-block; padding: 10px 24px;
    background: var(--pink); border-radius: 12px;
    font-weight: 700; font-size: 0.88rem;
    text-decoration: none; color: var(--dark); transition: .2s;
}
.modal-link:hover { background: var(--pink-dark); }

/* ══════════════════════════════════════════
   QUIZ
══════════════════════════════════════════ */
.quiz-q {
    background: var(--blue); padding: 26px 28px;
    border-radius: var(--radius-md); margin-bottom: 16px;
}
.quiz-q p { font-weight: 600; margin-bottom: 14px; }
.q-opt {
    display: block; width: 100%; padding: 13px 18px;
    margin: 8px 0; background: var(--white);
    border: 2px solid transparent; border-radius: 13px;
    cursor: pointer; text-align: left; transition: .2s;
    font-family: 'Poppins', sans-serif; font-size: 0.88rem;
}
.q-opt:hover { border-color: var(--pink-dark); background: var(--pink); }
.q-opt.selected { border-color: var(--pink-deeper); background: var(--pink); font-weight: 600; }
.q-opt.correct { border-color: #6fcf97; background: #e6fff3; }
.q-opt.wrong   { border-color: #ff6b81; background: #fff0f3; }
#quiz-result {
    text-align: center; font-size: 1.3rem; font-weight: 700;
    color: var(--pink-deeper); margin: 16px 0;
}
.submit-btn {
    display: block; margin: 0 auto;
    max-width: 200px; padding: 14px 24px;
    background: var(--pink); border: none;
    border-radius: 16px; font-weight: 700;
    cursor: pointer; font-size: 0.95rem;
    font-family: 'Poppins', sans-serif; transition: .2s;
}
.submit-btn:hover { background: var(--pink-dark); }

/* ══════════════════════════════════════════
   STORIES
══════════════════════════════════════════ */
.story-card {
    background: var(--blue); border-radius: var(--radius-md);
    overflow: hidden; cursor: pointer; margin-bottom: 14px;
    transition: background .25s; border: 2px solid transparent;
}
.story-card.open { background: var(--pink); border-color: var(--pink-dark); }
.story-header {
    padding: 18px 26px;
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 600; font-size: 1rem;
}
.story-header i { transition: transform .3s; color: var(--pink-deeper); }
.story-card.open .story-header i { transform: rotate(45deg); }
.story-body {
    max-height: 0; overflow: hidden;
    transition: max-height .4s ease-out;
    background: var(--white);
}
.story-card.open .story-body { max-height: 600px; border-top: 2px solid var(--blue); }
.story-body p { line-height: 1.9; padding: 22px 26px; font-size: 0.9rem; color: var(--muted); }

/* ══════════════════════════════════════════
   INFO / JSON DATA VIEW
══════════════════════════════════════════ */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 10px; }
.info-card {
    background: var(--blue); border-radius: var(--radius-md);
    padding: 20px 22px;
}
.info-card h4 { font-size: 0.85rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.info-card h4 i { color: var(--pink-deeper); }
.info-card p { font-size: 0.82rem; color: var(--muted); line-height: 1.8; }
.json-badge {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    background: var(--pink); color: var(--dark);
    padding: 2px 8px; border-radius: 6px;
    letter-spacing: .06em; vertical-align: middle; margin-left: 6px;
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
.dash-wrap { padding: 40px 56px; }
.dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.dash-header h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
.dash-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
.dash-stat {
    background: var(--blue); border-radius: var(--radius-md);
    padding: 20px; text-align: center;
}
.dash-stat .num { display: block; font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); }
.dash-stat .lbl { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-top: 4px; }
.dash-table-wrap { background: var(--light); border-radius: var(--radius-md); overflow: hidden; border: 1.5px solid var(--blue); }
.dash-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.dash-table th {
    background: var(--blue); padding: 12px 16px;
    text-align: left; font-size: 0.72rem; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase; color: var(--muted);
}
.dash-table td { padding: 13px 16px; border-bottom: 1.5px solid var(--blue); color: var(--dark); }
.dash-table tr:last-child td { border-bottom: none; }
.badge-new  { background: #e6fff3; color: #1a7a4a; padding: 3px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
.badge-read { background: var(--blue); color: var(--muted); padding: 3px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
.logout-btn {
    padding: 9px 20px; background: var(--pink);
    border: none; border-radius: 50px; font-weight: 700;
    cursor: pointer; font-size: 0.82rem; font-family: 'Poppins', sans-serif; transition: .2s;
}
.logout-btn:hover { background: var(--pink-dark); }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 720px) {
    .form-layout { flex-direction: column; padding: 32px 24px; gap: 24px; }
    .form-side-text { text-align: center; }
    .page-wrap { padding: 32px 20px; }
    .projects-grid, .about-grid, .info-grid, .dash-stats { grid-template-columns: 1fr; }
    nav { padding: 14px 20px; }
    .brand { font-size: 1.1rem; }
    .about-name { font-size: 1.8rem; letter-spacing: 2px; }
    .dash-wrap { padding: 24px 20px; }
}
    </style>
</head>
<body>

<div class="app-window">

    <!-- ══ NAV ══ -->
    <nav>
        <div class="brand">GLAISEL <span>PICO</span></div>
        <div class="nav-menu">
            <button class="nav-btn active-btn" id="btn-register" onclick="go('register')">Register</button>
            <button class="nav-btn" id="btn-login"    onclick="go('login')">Login</button>
            <button class="nav-btn" id="btn-about"    onclick="go('about')">About Me</button>
            <button class="nav-btn" id="btn-skills"   onclick="go('skills')">Skills</button>
            <button class="nav-btn" id="btn-projects" onclick="go('projects')">Projects</button>
            <button class="nav-btn" id="btn-quiz"     onclick="go('quiz')">Quiz</button>
            <button class="nav-btn" id="btn-info"     onclick="go('info')">Info</button>
            <button class="nav-btn" id="btn-stories"  onclick="go('stories')">Stories</button>
            <button class="nav-btn" id="btn-contact"  onclick="go('contact')">Contact</button>
        </div>
    </nav>

    <div id="viewport"></div>
</div>

<!-- ══ PROJECT MODAL ══ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
/* ════════════════════════════════════════

      detail: "Demonstrates async JavaScript, Fetch API, and JSON data parsing. City search with live result rendering.",

    {

   QUIZ  (from midterm, upgraded with
          answer reveal after submit)
════════════════════════════════════════ */
function renderQuiz() {
    const Qs = [
        { q: "Which of these is used to type letters?",       a: ["Mouse","Keyboard","Monitor"],  c: 1 },
        { q: "What is the 'brain' of the computer?",          a: ["CPU","RAM","Battery"],          c: 0 },
        { q: "Which one is a social media platform?",         a: ["Excel","Facebook","Photoshop"], c: 1 },
        { q: "What do you use to click things on screen?",    a: ["Keyboard","Printer","Mouse"],   c: 2 },
        { q: "A portable computer you can carry is called?",  a: ["Desktop","Laptop","Server"],    c: 1 }
    ];
    let html = `<div class="page-wrap"><h2 class="page-title">Computer Quiz</h2><p class="page-sub">Answer all 5 questions then tap Submit.</p>`;
    Qs.forEach((item, qi) => {
        const opts = item.a.map((opt, ai) =>
            `<button class="q-opt q-opt-${qi}" id="opt-${qi}-${ai}" onclick="pick(${qi},${ai})">${String.fromCharCode(65+ai)}. ${opt}</button>`
        ).join('');
        html += `<div class="quiz-q" id="qq-${qi}"><p>${qi+1}. ${item.q}</p>${opts}</div>`;
    });
    html += `<div id="quiz-result"></div>
             <button class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
             </div>`;
    vp.innerHTML = html;
    userAnswers = {};
}

function pick(qi, ai) {
    document.querySelectorAll(`.q-opt-${qi}`).forEach(b => b.classList.remove('selected'));
    document.getElementById(`opt-${qi}-${ai}`).classList.add('selected');
    userAnswers[qi] = ai;
}

function submitQuiz() {
    const correct = [1, 0, 1, 2, 1];
    if (Object.keys(userAnswers).length < 5) {
        alert('Please answer all 5 questions first!'); return;
    }
    let score = 0;
    correct.forEach((c, i) => {
        const chosen = userAnswers[i];
        if (chosen === c) {
            document.getElementById(`opt-${i}-${chosen}`).classList.add('correct');
            score++;
        } else {
            document.getElementById(`opt-${i}-${chosen}`).classList.add('wrong');
            document.getElementById(`opt-${i}-${c}`).classList.add('correct');
        }
    });
    const msgs = ['Keep studying! 📚','Not bad! 🙂','Decent! 👍','Great job! 🎉','Perfect score! 🌟'];
    document.getElementById('quiz-result').innerHTML =
        `Score: ${score} / 5 — ${msgs[score]}`;
}

   VALIDATION HELPERS
════════════════════════════════════════ */
const id   = sel => document.getElementById(sel);
const v    = sel => (id(sel) ? id(sel).value.trim() : '');
const show = sel => { const el = id(sel); if (el) el.style.display = 'block'; };

function setErr(fid, msg) {
    const el = id(fid + 'Err');
    if (el) el.textContent = msg;
    const inp = id(fid);
    if (inp) inp.classList.toggle('err', !!msg);
    return !msg;
}

function require(fid, val, msg) { return setErr(fid, val ? '' : msg); }
function emailOk(fid, val)      { return setErr(fid, /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val) ? '' : 'Enter a valid email.'); }
function minLen(fid, val, n, msg){ return setErr(fid, val.length >= n ? '' : msg); }
function match(fid, a, b, msg)  { return setErr(fid, a === b ? '' : msg); }

function togglePass(inputId, btn) {
    const inp = id(inputId);
    if (!inp) return;
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
}
